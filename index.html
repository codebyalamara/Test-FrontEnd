<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Task</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>

    <div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <form id="blogForm">
                <div class="form-group">
                    <label for="title">Title*</label>
                    <input type="text" id="title" class="form-control">
                </div>

                <div class="form-group">
                    <label for="content">Content*</label>
                    <textarea id="content" class="form-control"></textarea>
                </div>

                <button class="btn btn-primary btn-sm btn-block" type="submit" id="addBlogBtn">
                    Add Blog
                </button>

                <button class="btn btn-primary btn-sm btn-block d-none" type="button" id="updateBlogBtn">
                    Update Blog
                </button>
            </form>
        </div>
    </div>
</div>

<div class="container-fluid mt-4">
    <div class="row" id="blogContainer"></div>
</div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="app.js"></script>
</body>
</html>
